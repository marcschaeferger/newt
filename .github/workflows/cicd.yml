name: CI/CD Pipeline (AWS Self-Hosted Runners)

# CI/CD workflow for building, publishing, attesting, signing container images and building release binaries.
# Native multi-arch pipeline using two AWS EC2 self-hosted runners (x86_64 + arm64) to build and push architecture-specific images in parallel, then create multi-arch manifests.
#
# Required secrets:
# - AWS_ACCOUNT_ID, AWS_ROLE_NAME, AWS_REGION
# - EC2_INSTANCE_ID_AMD_RUNNER, EC2_INSTANCE_ID_ARM_RUNNER
# - DOCKER_HUB_USERNAME / DOCKER_HUB_ACCESS_TOKEN
# - GITHUB_TOKEN
# - COSIGN_PRIVATE_KEY / COSIGN_PASSWORD / COSIGN_PUBLIC_KEY

permissions:
  contents: write          # gh-release
  packages: write          # GHCR push
  id-token: write          # Keyless-Signatures & Attestations (OIDC)
  attestations: write      # actions/attest-build-provenance
  security-events: write   # upload-sarif
  actions: read

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (X.Y.Z or X.Y.Z-rc.N)"
        required: true
        type: string
      publish_latest:
        description: "Publish latest tag (non-RC only)"
        required: true
        type: boolean
        default: false
      publish_minor:
        description: "Publish minor tag (X.Y) (non-RC only)"
        required: true
        type: boolean
        default: false
      target_branch:
        description: "Branch to tag"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1) Start AWS EC2 runner instances
  # ---------------------------------------------------------------------------
  pre-run:
    name: Start AWS EC2 runners
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          role-duration-seconds: 3600
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Start EC2 instances
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID_AMD_RUNNER }}
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID_ARM_RUNNER }}
          echo "EC2 instances started"

  # ---------------------------------------------------------------------------
  # 2) Prepare release
  # ---------------------------------------------------------------------------
  prepare:
    if: github.event_name == 'workflow_dispatch'
    name: Prepare release (create tag)
    needs: [pre-run]
    runs-on: [self-hosted, linux, x64, us-east-1]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Validate version input
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Invalid version: $INPUT_VERSION (expected X.Y.Z or X.Y.Z-rc.N)" >&2
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          VERSION: ${{ inputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --prune origin
          git checkout "$TARGET_BRANCH"
          git pull --ff-only origin "$TARGET_BRANCH"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists" >&2
            exit 1
          fi
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/$VERSION"

  # ---------------------------------------------------------------------------
  # 3) Build and Release (x86 job)
  # ---------------------------------------------------------------------------
  build-amd:
    name: Build image (linux/amd64)
    needs: [pre-run, prepare]
    if: ${{ needs.pre-run.result == 'success' && ((github.event_name == 'push' && github.actor != 'github-actions[bot]') || (github.event_name == 'workflow_dispatch' && needs.prepare.result == 'success')) }}
    runs-on: [self-hosted, linux, x64, us-east-1]
    timeout-minutes: 120
    env:
      DOCKERHUB_IMAGE: docker.io/fosrl/${{ github.event.repository.name }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      is_rc: ${{ steps.tag.outputs.is_rc }}
      major: ${{ steps.tag.outputs.major }}
      minor: ${{ steps.tag.outputs.minor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Monitor storage space
        shell: bash
        run: |
          THRESHOLD=75
          USED_SPACE=$(df / | grep / | awk '{ print $5 }' | sed 's/%//g')
          echo "Used space: $USED_SPACE%"
          if [ "$USED_SPACE" -ge "$THRESHOLD" ]; then
            echo "Disk usage >= ${THRESHOLD}%, pruning docker..."
            echo y | docker system prune -a || true
          else
            echo "Disk usage < ${THRESHOLD}%, no action needed."
          fi

      - name: Determine tag + rc/major/minor
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_VERSION"
          else
            TAG="${{ github.ref_name }}"
          fi

          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi

          IS_RC="false"
          if [[ "$TAG" =~ -rc\.[0-9]+$ ]]; then
            IS_RC="true"
          fi

          MAJOR="$(echo "$TAG" | cut -d. -f1)"
          MINOR="$(echo "$TAG" | cut -d. -f1,2)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_rc=$IS_RC" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "IS_RC=$IS_RC" >> $GITHUB_ENV
          echo "MAJOR_TAG=$MAJOR" >> $GITHUB_ENV
          echo "MINOR_TAG=$MINOR" >> $GITHUB_ENV

      - name: Capture created timestamp
        run: echo "IMAGE_CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
        shell: bash

      #- name: Set up QEMU
      #  uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      #- name: Set up Docker Buildx
      #  uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image names to lowercase
        shell: bash
        run: |
          set -euo pipefail
          echo "GHCR_IMAGE=${GHCR_IMAGE,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=${DOCKERHUB_IMAGE,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Build ONLY amd64 and push arch-specific tag suffixes used later for manifest creation.
      - name: Build and push (amd64 -> *:amd64-TAG)
        id: build_amd
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_IMAGE }}:amd64-${{ env.TAG }}
            ${{ env.DOCKERHUB_IMAGE }}:amd64-${{ env.TAG }}
          cache-from: type=gha,scope=${{ github.repository }}-amd64
          cache-to: type=gha,mode=max,scope=${{ github.repository }}-amd64

  # ---------------------------------------------------------------------------
  # 4) Build ARM64 image natively on ARM runner
  # ---------------------------------------------------------------------------
  build-arm:
    name: Build image (linux/arm64)
    needs: [pre-run, prepare]
    if: ${{ needs.pre-run.result == 'success' && ((github.event_name == 'push' && github.actor != 'github-actions[bot]') || (github.event_name == 'workflow_dispatch' && needs.prepare.result == 'success')) }}
    runs-on: [self-hosted, linux, arm64, us-east-1] # NOTE: ensure label exists on runner
    timeout-minutes: 120
    env:
      DOCKERHUB_IMAGE: docker.io/fosrl/${{ github.event.repository.name }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Monitor storage space
        shell: bash
        run: |
          THRESHOLD=75
          USED_SPACE=$(df / | grep / | awk '{ print $5 }' | sed 's/%//g')
          echo "Used space: $USED_SPACE%"
          if [ "$USED_SPACE" -ge "$THRESHOLD" ]; then
            echo y | docker system prune -a || true
          fi

      - name: Determine tag + validate format
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_VERSION"
          else
            TAG="${{ github.ref_name }}"
          fi

          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image names to lowercase
        shell: bash
        run: |
          set -euo pipefail
          echo "GHCR_IMAGE=${GHCR_IMAGE,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=${DOCKERHUB_IMAGE,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Build ONLY arm64 and push arch-specific tag suffixes used later for manifest creation.
      - name: Build and push (arm64 -> *:arm64-TAG)
        id: build_arm
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.GHCR_IMAGE }}:arm64-${{ env.TAG }}
            ${{ env.DOCKERHUB_IMAGE }}:arm64-${{ env.TAG }}
          cache-from: type=gha,scope=${{ github.repository }}-arm64
          cache-to: type=gha,mode=max,scope=${{ github.repository }}-arm64

  # ---------------------------------------------------------------------------
  # 5) Create and push multi-arch manifests (TAG, plus optional latest/major/minor)
  # ---------------------------------------------------------------------------
  create-manifest:
    name: Create multi-arch manifests
    needs: [build-amd, build-arm]
    if: ${{ needs.build-amd.result == 'success' && needs.build-arm.result == 'success' }}
    runs-on: [self-hosted, linux, x64, us-east-1] # NOTE: ensure label exists on runner
    timeout-minutes: 30
    env:
      DOCKERHUB_IMAGE: docker.io/fosrl/${{ github.event.repository.name }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
      TAG: ${{ needs.build-amd.outputs.tag }}
      IS_RC: ${{ needs.build-amd.outputs.is_rc }}
      MAJOR_TAG: ${{ needs.build-amd.outputs.major }}
      MINOR_TAG: ${{ needs.build-amd.outputs.minor }}
      # workflow_dispatch controls are respected only here (tagging policy)
      PUBLISH_LATEST: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_latest || vars.PUBLISH_LATEST }}
      PUBLISH_MINOR:  ${{ github.event_name == 'workflow_dispatch' && inputs.publish_minor  || vars.PUBLISH_MINOR  }}
    steps:
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image names to lowercase
        shell: bash
        run: |
          set -euo pipefail
          echo "GHCR_IMAGE=${GHCR_IMAGE,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=${DOCKERHUB_IMAGE,,}" >> "$GITHUB_ENV"

      - name: Create manifest for GHCR (:TAG)
        shell: bash
        run: |
          set -euo pipefail
          docker manifest create "${GHCR_IMAGE}:${TAG}" \
            --amend "${GHCR_IMAGE}:amd64-${TAG}" \
            --amend "${GHCR_IMAGE}:arm64-${TAG}"
          docker manifest push "${GHCR_IMAGE}:${TAG}"

      - name: Create manifest for Docker Hub (:TAG)
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          docker manifest create "${DOCKERHUB_IMAGE}:${TAG}" \
            --amend "${DOCKERHUB_IMAGE}:amd64-${TAG}" \
            --amend "${DOCKERHUB_IMAGE}:arm64-${TAG}"
          docker manifest push "${DOCKERHUB_IMAGE}:${TAG}"

      # Optional tags for non-RC releases: latest, major, minor
      - name: Publish additional tags (non-RC only)
        if: ${{ env.IS_RC != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          tags_to_publish=()
          tags_to_publish+=("${MAJOR_TAG}")
          if [ "${PUBLISH_MINOR}" = "true" ]; then
            tags_to_publish+=("${MINOR_TAG}")
          fi
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            tags_to_publish+=("latest")
          fi

          for t in "${tags_to_publish[@]}"; do
            echo "Publishing GHCR tag ${t} -> ${TAG}"
            docker manifest create "${GHCR_IMAGE}:${t}" \
              --amend "${GHCR_IMAGE}:amd64-${TAG}" \
              --amend "${GHCR_IMAGE}:arm64-${TAG}"
            docker manifest push "${GHCR_IMAGE}:${t}"

            if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" ]; then
              echo "Publishing Docker Hub tag ${t} -> ${TAG}"
              docker manifest create "${DOCKERHUB_IMAGE}:${t}" \
                --amend "${DOCKERHUB_IMAGE}:amd64-${TAG}" \
                --amend "${DOCKERHUB_IMAGE}:arm64-${TAG}"
              docker manifest push "${DOCKERHUB_IMAGE}:${t}"
            fi
          done

  # ---------------------------------------------------------------------------
  # 6) Sign/attest + build binaries + draft release (x86 runner)
  # ---------------------------------------------------------------------------
  sign-and-release:
    name: Sign, attest, and release
    needs: [create-manifest, build-amd]
    if: ${{ needs.create-manifest.result == 'success' && needs.build-amd.result == 'success' }}
    runs-on: [self-hosted, linux, x64, us-east-1] # NOTE: ensure label exists on runner
    timeout-minutes: 120
    env:
      DOCKERHUB_IMAGE: docker.io/fosrl/${{ github.event.repository.name }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
      TAG: ${{ needs.build-amd.outputs.tag }}
      IS_RC: ${{ needs.build-amd.outputs.is_rc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Capture created timestamp
        run: echo "IMAGE_CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
        shell: bash

      - name: Install Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image names to lowercase
        shell: bash
        run: |
          set -euo pipefail
          echo "GHCR_IMAGE=${GHCR_IMAGE,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=${DOCKERHUB_IMAGE,,}" >> "$GITHUB_ENV"

      - name: Resolve multi-arch digest refs (by TAG)
        shell: bash
        run: |
          set -euo pipefail
          GHCR_DIGEST="$(docker buildx imagetools inspect "${GHCR_IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')"
          echo "GHCR_REF=${GHCR_IMAGE}@${GHCR_DIGEST}" >> $GITHUB_ENV
          echo "Resolved GHCR_REF=${GHCR_IMAGE}@${GHCR_DIGEST}"
          if [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" ]; then
            DH_DIGEST="$(docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')"
            echo "DH_REF=${DOCKERHUB_IMAGE}@${DH_DIGEST}" >> $GITHUB_ENV
            echo "Resolved DH_REF=${DOCKERHUB_IMAGE}@${DH_DIGEST}"
          fi

      - name: Extract digests for attestation
        shell: bash
        run: |
          set -euo pipefail
          echo "GHCR_DIGEST=${GHCR_REF#*@}" >> $GITHUB_ENV
          if [ -n "${DH_REF:-}" ]; then
            echo "DH_DIGEST=${DH_REF#*@}" >> $GITHUB_ENV
          fi

      - name: Attest build provenance (GHCR) (digest)
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ env.GHCR_DIGEST }}
          push-to-registry: true
          show-summary: true

      - name: Attest build provenance (Docker Hub)
        continue-on-error: true
        if: ${{ env.DH_DIGEST != '' }}
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: index.docker.io/fosrl/${{ github.event.repository.name }}
          subject-digest: ${{ env.DH_DIGEST }}
          push-to-registry: true
          show-summary: true

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v3.0.2"

      - name: Sanity check cosign private key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD:    ${{ secrets.COSIGN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          cosign public-key --key env://COSIGN_PRIVATE_KEY >/dev/null

      - name: Generate SBOM (SPDX JSON) from GHCR digest
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: ${{ env.GHCR_REF }}
          format: spdx-json
          output: sbom.spdx.json

      - name: Validate + minify SBOM JSON
        shell: bash
        run: |
          set -euo pipefail
          jq -e . sbom.spdx.json >/dev/null
          jq -c . sbom.spdx.json > sbom.min.json && mv sbom.min.json sbom.spdx.json

      - name: Sign GHCR digest (key, recursive)
        env:
          COSIGN_YES: "true"
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD:    ${{ secrets.COSIGN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          cosign sign --key env://COSIGN_PRIVATE_KEY --recursive "${GHCR_REF}"
          sleep 20

      - name: Create SBOM attestation (GHCR, key)
        env:
          COSIGN_YES: "true"
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD:    ${{ secrets.COSIGN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          cosign attest \
            --key env://COSIGN_PRIVATE_KEY \
            --type spdxjson \
            --predicate sbom.spdx.json \
            "${GHCR_REF}"

      - name: Keyless sign & verify GHCR digest (OIDC)
        env:
          COSIGN_YES: "true"
          WORKFLOW_REF: ${{ github.workflow_ref }}
          ISSUER: https://token.actions.githubusercontent.com
        shell: bash
        run: |
          set -euo pipefail
          cosign sign --rekor-url https://rekor.sigstore.dev --recursive "${GHCR_REF}"
          cosign verify \
            --certificate-oidc-issuer "${ISSUER}" \
            --certificate-identity "https://github.com/${WORKFLOW_REF}" \
            "${GHCR_REF}" -o text

      - name: Verify signature (public key) GHCR digest + tag
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          cosign verify --key env://COSIGN_PUBLIC_KEY "${GHCR_REF}" -o text
          cosign verify --key env://COSIGN_PUBLIC_KEY "${GHCR_IMAGE}:${TAG}" -o text

      - name: Verify SBOM attestation (GHCR)
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: cosign verify-attestation --key env://COSIGN_PUBLIC_KEY --type spdxjson "${GHCR_REF}" -o text
        shell: bash

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOFLAGS: "-trimpath"
        shell: bash
        run: |
          set -euo pipefail
          make -j 10 go-build-release tag="${TAG}"

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          prerelease: ${{ env.IS_RC == 'true' }}
          files: |
            bin/*
          fail_on_unmatched_files: true
          draft: true
          body: |
            ## Container Images
            - GHCR: `${{ env.GHCR_REF }}`
            - Docker Hub: `${{ env.DH_REF || 'N/A' }}`
            **Tag:** `${{ env.TAG }}`

  # ---------------------------------------------------------------------------
  # 7) Stop AWS EC2 runner instances
  # ---------------------------------------------------------------------------
  post-run:
    name: Stop AWS EC2 runners
    needs: [pre-run, prepare, build-amd, build-arm, create-manifest, sign-and-release]
    if: >-
      ${{
        always() &&
        (needs.pre-run.result == 'success'  &&
        (needs.build-amd.result == 'success' || needs.build-amd.result == 'failure' || needs.build-amd.result == 'cancelled') || 
         needs.build-amd.result != 'skipped') &&
        (needs.build-arm.result == 'success' || needs.build-arm.result == 'failure' || needs.build-arm.result == 'cancelled') ||
        needs.build-arm.result != 'skipped') &&
        (needs.create-manifest.result == 'success' || needs.create-manifest.result == 'failure' || needs.create-manifest.result == 'cancelled') ||
        needs.create-manifest.result != 'skipped') &&
        (needs.sign-and-release.result == 'success' || needs.sign-and-release.result == 'failure' || needs.sign-and-release.result == 'cancelled') ||
        needs.sign-and-release.result != 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          role-duration-seconds: 3600
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Stop EC2 instances
        run: |
          aws ec2 stop-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID_AMD_RUNNER }}
          aws ec2 stop-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID_ARM_RUNNER }}
          echo "EC2 instances stopped"
